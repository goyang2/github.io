<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>뭐야</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #0a0a0a; --fg: #f0ede6; --accent: #c8f060; --muted: #3a3a3a; }
    body { background: var(--bg); color: var(--fg); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; }
    .container { position: relative; z-index: 1; text-align: center; padding: 2rem; }
    .tag { display: inline-block; font-family: 'Syne', sans-serif; font-size: 0.7rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); border: 1px solid var(--accent); padding: 0.3em 0.9em; margin-bottom: 2.5rem; opacity: 0; animation: fadeUp 0.6s ease forwards 0.2s; }
    h1 { font-family: 'Syne', sans-serif; font-size: clamp(3.5rem, 12vw, 9rem); font-weight: 800; line-height: 0.9; letter-spacing: -0.03em; opacity: 0; animation: fadeUp 0.7s ease forwards 0.4s; }
    h1 span { color: var(--accent); display: block; }
    .sub { margin-top: 2rem; font-size: 0.95rem; font-weight: 300; color: #888; letter-spacing: 0.05em; opacity: 0; animation: fadeUp 0.7s ease forwards 0.65s; }
    .dot { display: inline-block; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; margin: 0 0.5rem; vertical-align: middle; animation: pulse 1.8s ease-in-out infinite; }
    .line { position: fixed; background: var(--muted); }
    .line-h { width: 100vw; height: 1px; left: 0; }
    .line-v { height: 100vh; width: 1px; top: 0; }
    .line-h.top { top: 12%; } .line-h.bottom { bottom: 12%; }
    .line-v.left { left: 8%; } .line-v.right { right: 8%; }
    .corner { position: fixed; width: 18px; height: 18px; border-color: var(--muted); border-style: solid; border-width: 0; }
    .corner.tl { top: 1.5rem; left: 1.5rem; border-top-width: 1px; border-left-width: 1px; }
    .corner.tr { top: 1.5rem; right: 1.5rem; border-top-width: 1px; border-right-width: 1px; }
    .corner.bl { bottom: 1.5rem; left: 1.5rem; border-bottom-width: 1px; border-left-width: 1px; }
    .corner.br { bottom: 1.5rem; right: 1.5rem; border-bottom-width: 1px; border-right-width: 1px; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.7); } }
  </style>
</head>
<body>
  <div class="line line-h top"></div>
  <div class="line line-h bottom"></div>
  <div class="line line-v left"></div>
  <div class="line line-v right"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div class="container">
    <div class="tag">v1.0 — ready</div>
    <h1>WEL<span>COME</span></h1>
    <p class="sub"><span class="dot"></span>77ㅗ뭐함ㅇㅎㅎㅎㅎㅇ<span class="dot"></span></p>
  </div>
</body>
</html>
